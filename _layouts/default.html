<!DOCTYPE html>
<html lang="en">
  <head>
    <title>{% if page.title %}{{ page.title }} – {% endif %}{{ site.title }}</title>

    {% include meta.html %}
    <meta name="color-scheme" content="light dark">

    <link rel="stylesheet" href="{{ site.baseurl }}/main.css" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto:300,400,500|Material+Icons+Outlined" />

    <link rel="alternate" type="application/rss+xml" title="{{ site.title }} - {{ site.description }}" href="{{ site.baseurl }}/feed.xml" />

  </head>

  <body id="page-top">
    <nav class="site-navbar fixed-top" role="navigation" aria-label="Main navigation">
      <div class="container">
        <a class="brand" href="{{ site.baseurl }}/">logo goes here</a>
        <button class="nav-toggle" aria-expanded="false" aria-label="Toggle navigation"><span class="hamburger" aria-hidden="true"></span></button>
        <ul class="nav-links">
          <li><a href="{{ site.baseurl }}/blog/">Blog</a></li>
          <li><a href="{{ site.baseurl }}/projects/">Current Projects</a></li>
        </ul>
      </div>
    </nav>

    <div id="main" role="main">
      {{ content }}
    </div>

    <footer class="footer">
      <div class="container">
        <div class="row">
          <div class="col-md footer-logo">
            <p class="footer-text">
              <b>&copy; 2023 - {{ site.time | date: '%Y' }} ._______166 </b>
            </p>
          </div>
          <img alt="Trans Rights Now! gif" src="{{ site.baseurl }}/assets/transnow2.gif" ></img>
          <div class="col-md">
            <div class="footer-icons">
              {% include footer-icons.html %}
            </div>
          </div>
        </div>
      </div>
    </footer>
    <script>
    (function(){
      var btn=document.querySelector('.nav-toggle'), nav=document.querySelector('.nav-links');
      if(btn && nav){
        btn.addEventListener('click', function(){
          var open = nav.classList.toggle('open');
          btn.setAttribute('aria-expanded', open? 'true':'false');
        });
      }
    })();
    </script>
  </body>
</html>
