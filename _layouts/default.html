<!DOCTYPE html>
<html lang="en">
  <head>
    <title>{% if page.title %}{{ page.title }} – {% endif %}{{ site.title }}</title>

    {% include meta.html %}

    <link rel="stylesheet" href="{{ site.baseurl }}/main.css" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto:300,400,500|Material+Icons+Outlined" />

    <link rel="alternate" type="application/rss+xml" title="{{ site.title }} - {{ site.description }}" href="{{ site.baseurl }}/feed.xml" />

  </head>

  <body id="page-top">
    <nav class="navbar fixed-top navbar-expand-lg">
      <div class="container">
          <a class="navbar-brand" href="{{ site.baseurl }}/">
            logo goes here
          </a>
          <ul class="nav navbar-nav">
            <li class="nav-item">
              <a class="nav-link" href="{{ site.baseurl }}/blog/">Blog</a></li>
            <li class="nav-item">
              <a class="nav-link" href="{{ site.baseurl }}/projects/">Current Projects</a></li>
          </ul>
      </div>
    </nav>

    <div id="main" role="main">
      {{ content }}
    </div>

    <footer class="footer">
      <div class="container">
        <div class="row">
          <div class="col-md footer-logo">
            <p class="footer-text">
              <b>&copy; 2023 - {{ site.time | date: '%Y' }} ._______166 </b>
            </p>
          </div>
          <img alt="Trans Rights Now! gif" src="{{ site.baseurl }}/assets/transnow2.gif" ></img>
          <div class="col-md">
            <div class="footer-icons">
              {% include footer-icons.html %}
            </div>
          </div>
        </div>
      </div>
    </footer>
  </body>
</html>
